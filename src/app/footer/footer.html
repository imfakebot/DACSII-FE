<footer class="bg-surface-container border-t border-gray-100 text-text-secondary pt-16 pb-8">
  <div class="container mx-auto px-4">
    <!-- Switch to 3 equal columns on large screens to avoid empty right space -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 lg:gap-12 mb-12 items-start">
      <!-- Column 1: Logo + info -->
      <div class="space-y-4 max-w-md">
        <div class="flex items-center gap-3 mb-2">
          <img src="/assets/logoHaiAnhEm.png" alt="Logo" class="w-12 h-12 rounded-full border border-gray-200" />
          <span class="text-xl font-bold text-text-primary">Sport Booking</span>
        </div>
        <p class="text-sm leading-relaxed">
          Nền tảng đặt sân thể thao hàng đầu, mang đến trải nghiệm tiện lợi và nhanh chóng cho cộng đồng yêu thể thao.
        </p>
        <div class="space-y-3 text-sm pt-2">
          <p class="flex items-start gap-3">
            <i class="fa-solid fa-location-dot mt-1 text-secondary flex-shrink-0"></i>
            <span>{{dress}}</span>
          </p>
          <p class="flex items-center gap-3">
            <i class="fa-solid fa-phone text-secondary flex-shrink-0"></i>
            <a href="tel:0765539316" class="hover:text-secondary transition-colors">{{hotline}}</a>
          </p>
          <p class="flex items-center gap-3">
            <i class="fa-solid fa-envelope text-secondary flex-shrink-0"></i>
            <a href="mailto:linhtvt24it@vku.udn.vn" class="hover:text-secondary transition-colors break-all">{{email}}</a>
            <br>
            <a href="mailto:anhtt24it@vku.udn.vn" class="hover:text-secondary transition-colors break-all">{{email1}}</a>
          </p>
        </div>
      </div>

      <!-- Column 2: Liên kết nhanh (restored to original simple list) -->
      <div>
        <h3 class="text-lg font-semibold mb-4 text-text-primary">Liên kết nhanh</h3>
        <ul class="space-y-3 text-sm">
          <li><a [routerLink]="['/']" class="hover:text-secondary">Trang chủ</a></li>
          <li><a [routerLink]="['/about']" class="hover:text-secondary">Giới thiệu</a></li>
          <li><a [routerLink]="['/contact']" class="hover:text-secondary">Liên hệ</a></li>
        </ul>
      </div>

      <!-- Column 3: Social + App badges + newsletter -->
      <div class="">
        <h3 class="text-lg font-semibold mb-4 text-text-primary">Kết nối với chúng tôi</h3>
        <div class="flex items-center gap-4 mb-6">
          <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-[#5F6368] hover:bg-[#F1F3F4] hover:text-secondary transition-colors duration-fast shadow-sm">
            <img src="/assets/icons/facebook.svg" alt="Facebook" class="w-5 h-5 opacity-70" />
          </a>
          <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-[#5F6368] hover:bg-[#F1F3F4] hover:text-secondary transition-colors duration-fast shadow-sm">
            <img src="/assets/icons/ins.svg" alt="Instagram" class="w-5 h-5 opacity-70" />
          </a>
          <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-[#5F6368] hover:bg-[#F1F3F4] hover:text-secondary transition-colors duration-fast shadow-sm">

      </div>

    <div class="border-t border-gray-200 pt-8 text-center text-sm">
      <p>&copy; 2025 Sport Booking. All rights reserved.</p>
    </div>
